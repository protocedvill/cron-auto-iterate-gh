# Template config for cron-auto-iterate-gh.
# Copy/deploy this to /var/lib/cron-iterate/config.yaml and fill in real repos.
# See plan.md for the full design. On-disk clone location for each repo is
# always /var/lib/cron-iterate/repos/<name> - not configurable here, since
# that's the only path the cron-iterate user is allowed to write to.

repos:
  - name: example-repo
    # GitHub deploy keys are unique account-wide (one repo per key), so
    # each repo here needs its own keypair + SSH config alias - run
    # `./add-repo-key.sh example-repo` (see README step 5), which prints
    # the exact aliased remote to use below.
    remote: git@github.com-example-repo:your-org/example-repo.git
    test_cmd: "npm test"
    todo_file: TODO.md   # default, can be omitted
    # branch: main        # default: repo's current HEAD branch after clone

defaults:
  max_turns: 40
  timeout_seconds: 900
  forbidden_paths:
    - ".git/**"
    - ".env*"
    - "**/*.pem"
    - "**/id_rsa*"
    - ".github/workflows/**"
    - "**/secrets/**"
  # Passed explicitly on every `git commit` via `-c user.name=... -c
  # user.email=...` - no `git config --global` setup needed on the
  # cron-iterate account. Override per-repo if you want commits attributed
  # differently for a given project.
  committer_name: "cron-auto-iterate-gh"
  committer_email: "user@localhost"
